name: Lint PR
on:
    pull_request_target:
        types: [opened, edited, synchronize, reopened]
jobs:
    validate:
        name: Validate title
        runs-on: localdev-e2e-test-1775995566-main
        steps:
            - uses: amannn/action-semantic-pull-request@v4
              with:
                types: chore docs fix feat test misc
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
